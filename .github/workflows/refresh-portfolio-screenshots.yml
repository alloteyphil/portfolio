name: Refresh Portfolio Screenshots

on:
  push:
    branches:
      - main

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger screenshot refresh route
        env:
          REFRESH_URL: ${{ secrets.SCREENSHOT_REFRESH_URL || vars.SCREENSHOT_REFRESH_URL || secrets.PORTFOLIO_REFRESH_URL || vars.PORTFOLIO_REFRESH_URL }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SCREENSHOTS_SECRET || vars.REFRESH_SCREENSHOTS_SECRET || secrets.SCREENSHOT_REFRESH_SECRET || vars.SCREENSHOT_REFRESH_SECRET }}
        run: |
          if [ -z "$REFRESH_URL" ] || [ -z "$REFRESH_SECRET" ]; then
            echo "::warning::Skipping screenshot refresh. Set SCREENSHOT_REFRESH_URL and REFRESH_SCREENSHOTS_SECRET (or supported legacy names)."
            exit 0
          fi

          response_file="$(mktemp)"
          status_code="$(curl -X POST "$REFRESH_URL" \
            -H "Authorization: Bearer $REFRESH_SECRET" \
            -H "Content-Type: application/json" \
            --retry 3 \
            --retry-delay 2 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 180 \
            --silent \
            --show-error \
            --output "$response_file" \
            --write-out "%{http_code}")"

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            echo "Refresh endpoint failed with HTTP ${status_code}"
            cat "$response_file"
            exit 1
          fi

          echo "Refresh endpoint succeeded with HTTP ${status_code}"
          cat "$response_file"
